<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=900, initial-scale=1.0">
  <title>Mente WeChat Cover</title>
  <style>
    :root {
      --bg-1: #081a2f;
      --bg-2: #0d3158;
      --bg-3: #1c6ea4;
      --ink: #f7fbff;
      --muted: #bdd9ee;
      --accent: #ffd166;
      --line: rgba(255, 255, 255, 0.14);
      --card: rgba(8, 22, 42, 0.55);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 900px;
      height: 383px;
      overflow: hidden;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 82% 24%, rgba(255, 209, 102, 0.32), transparent 28%),
        radial-gradient(circle at 18% 82%, rgba(84, 201, 255, 0.24), transparent 34%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 52%, var(--bg-3) 100%);
      color: var(--ink);
    }

    .frame {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 34px 40px;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, transparent 0, transparent calc(100% - 1px), rgba(255,255,255,0.06) calc(100% - 1px)),
        linear-gradient(to bottom, transparent 0, transparent calc(100% - 1px), rgba(255,255,255,0.05) calc(100% - 1px));
      background-size: 120px 120px;
      opacity: 0.32;
    }

    .topline {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(8, 18, 34, 0.42);
      backdrop-filter: blur(6px);
      font-size: 15px;
      letter-spacing: 0.08em;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(180deg, #ffd166, #ff8c42);
      box-shadow: 0 0 22px rgba(255, 209, 102, 0.7);
    }

    h1 {
      margin: 22px 0 14px;
      width: 575px;
      font-size: 42px;
      line-height: 1.15;
      letter-spacing: -0.02em;
      font-weight: 800;
    }

    .highlight {
      color: var(--accent);
    }

    .subtitle {
      width: 560px;
      margin: 0;
      color: var(--muted);
      font-size: 19px;
      line-height: 1.55;
    }

    .badges {
      display: flex;
      gap: 12px;
      margin-top: 26px;
      flex-wrap: wrap;
      width: 560px;
    }

    .badge {
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(7, 20, 37, 0.56);
      border: 1px solid var(--line);
      font-size: 15px;
      color: #eff6fb;
    }

    .panel {
      position: absolute;
      right: 36px;
      top: 42px;
      width: 228px;
      padding: 18px 18px 16px;
      border-radius: 24px;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 24px 40px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(12px);
    }

    .panel-title {
      margin: 0 0 12px;
      font-size: 16px;
      color: #dcecf7;
    }

    .pill {
      display: inline-block;
      margin: 0 8px 8px 0;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: #f8fcff;
      font-size: 13px;
    }

    .footer {
      position: absolute;
      left: 40px;
      bottom: 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 14px;
      letter-spacing: 0.08em;
    }

    .logo {
      width: 30px;
      height: 30px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #09203a;
      background: linear-gradient(180deg, #ffd166, #f7b733);
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="grid"></div>
    <div class="topline">
      <span class="dot"></span>
      <span>AI AGENT ERA</span>
    </div>
    <h1>AI Agent 不该只是会聊天<br><span class="highlight">Mente 值得现在试一次</span></h1>
    <p class="subtitle">从 GitHub 发布、统一身份到长期记忆、多平台执行和云端运行，Mente 正在把 Agent 做成真正能交付工作的产品。</p>
    <div class="badges">
      <div class="badge">GitHub 已发布</div>
      <div class="badge">长期记忆</div>
      <div class="badge">多平台执行</div>
      <div class="badge">Codex-backed</div>
    </div>
    <div class="panel">
      <p class="panel-title">为什么是 Mente</p>
      <span class="pill">统一入口</span>
      <span class="pill">进度可见</span>
      <span class="pill">技能沉淀</span>
      <span class="pill">定时调度</span>
      <span class="pill">云端后端</span>
      <span class="pill">模型可切换</span>
    </div>
    <div class="footer">
      <span class="logo">M</span>
      <span>MENTE · UNIFIED AI AGENT</span>
    </div>
  </div>
</body>
</html>
